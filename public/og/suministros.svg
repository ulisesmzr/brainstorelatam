<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" font-family="-apple-system,'Manrope','Inter',system-ui,sans-serif">

  <!-- Background -->
  <rect width="1200" height="630" fill="#FAFAF6"/>

  <!-- Top yellow strip accent -->
  <rect x="0" y="0" width="1200" height="8" fill="#FFD400"/>

  <!-- Top-left brand block -->
  <g transform="translate(80,72)">
    <!-- Isotipo dorado (cuadrado con punto) -->
    <rect x="0" y="0" width="44" height="44" rx="6" fill="#C9A227"/>
    <circle cx="22" cy="22" r="6" fill="#FAFAF6"/>
    <!-- Wordmark brain·store -->
    <text x="60" y="32" font-size="26" font-weight="800" fill="#0A0A0A" letter-spacing="-0.5">
      brain<tspan fill="#C9A227">·</tspan>store
    </text>
  </g>

  <!-- Top-right label -->
  <g transform="translate(1120,94)" text-anchor="end">
    <text font-size="13" font-weight="700" fill="#0A0A0A" letter-spacing="2">
      01 / SUMINISTROS CORPORATIVOS
    </text>
  </g>

  <!-- Main heading -->
  <g transform="translate(80,220)">
    <text font-size="78" font-weight="800" fill="#0A0A0A" letter-spacing="-2">
      Un proveedor.
    </text>
    <text y="92" font-size="78" font-weight="800" fill="#0A0A0A" letter-spacing="-2">
      <tspan fill="#0A0A0A">Diez </tspan>
      <tspan fill="#C9A227">países</tspan>
      <tspan fill="#0A0A0A">.</tspan>
    </text>
  </g>

  <!-- Subtitle -->
  <g transform="translate(80,418)">
    <text font-size="20" font-weight="500" fill="#0A0A0A" opacity="0.7">
      Suministros corporativos e industriales B2B en Latinoamérica.
    </text>
  </g>

  <!-- Stats grid (4 stats horizontal) -->
  <g transform="translate(80,500)">

    <!-- Stat 1: Productos -->
    <g>
      <text font-size="40" font-weight="800" fill="#0A0A0A" letter-spacing="-1.5">150,000+</text>
      <text y="32" font-size="13" font-weight="600" fill="#0A0A0A" opacity="0.5" letter-spacing="1.5">PRODUCTOS</text>
    </g>

    <!-- Stat 2: Categorías -->
    <g transform="translate(280,0)">
      <text font-size="40" font-weight="800" fill="#0A0A0A" letter-spacing="-1.5">9</text>
      <text y="32" font-size="13" font-weight="600" fill="#0A0A0A" opacity="0.5" letter-spacing="1.5">CATEGORÍAS</text>
    </g>

    <!-- Stat 3: Países -->
    <g transform="translate(440,0)">
      <text font-size="40" font-weight="800" fill="#0A0A0A" letter-spacing="-1.5">10</text>
      <text y="32" font-size="13" font-weight="600" fill="#0A0A0A" opacity="0.5" letter-spacing="1.5">PAÍSES LATAM</text>
    </g>

    <!-- Stat 4: Marcas -->
    <g transform="translate(620,0)">
      <text font-size="40" font-weight="800" fill="#0A0A0A" letter-spacing="-1.5">250+</text>
      <text y="32" font-size="13" font-weight="600" fill="#0A0A0A" opacity="0.5" letter-spacing="1.5">MARCAS</text>
    </g>

    <!-- Stat 5: SLA -->
    <g transform="translate(800,0)">
      <text font-size="40" font-weight="800" fill="#0A0A0A" letter-spacing="-1.5">24h</text>
      <text y="32" font-size="13" font-weight="600" fill="#0A0A0A" opacity="0.5" letter-spacing="1.5">COTIZACIÓN</text>
    </g>

  </g>

  <!-- Bottom-right yellow accent (geometric) -->
  <g transform="translate(960,180)">
    <!-- Star/spark dorado -->
    <path d="M120 0 L132 100 L240 120 L132 140 L120 240 L108 140 L0 120 L108 100 Z"
          fill="#FFD400" opacity="0.95"/>
    <!-- Inner contrast -->
    <circle cx="120" cy="120" r="14" fill="#C9A227"/>
  </g>

  <!-- Bottom URL bar -->
  <rect x="0" y="610" width="1200" height="20" fill="#0A0A0A"/>
  <text x="80" y="624" font-size="11" font-weight="600" fill="#FAFAF6" letter-spacing="2">
    BRAINSTORE.COM.MX / SUMINISTROS-CORPORATIVOS
  </text>
  <text x="1120" y="624" font-size="11" font-weight="500" fill="#FAFAF6" opacity="0.6" letter-spacing="1" text-anchor="end">
    PROVEEDOR B2B MULTINACIONAL · DESDE 2014
  </text>

</svg>
